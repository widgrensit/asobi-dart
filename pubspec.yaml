name: asobi
description: >-
  Dart client SDK for the Asobi game backend. Real-time multiplayer,
  matchmaking, leaderboards, economy, social, and more. Works with
  Flutter, Flame, and standalone Dart.
version: 0.1.0
repository: https://github.com/widgrensit/asobi-dart
homepage: https://github.com/widgrensit/asobi-dart
topics:
  - game
  - multiplayer
  - game-backend
  - matchmaking
  - websocket

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  http: ^1.2.0
  web_socket_channel: ^3.0.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.25.0
